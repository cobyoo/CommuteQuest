<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" shape-rendering="crispEdges">
  <!-- Senior: Confident, tie, briefcase -->

  <!-- Shadow -->
  <ellipse cx="32" cy="61" rx="10" ry="2" fill="#00000033"/>

  <!-- Briefcase -->
  <rect x="42" y="40" width="12" height="9" fill="#8b6914"/>
  <rect x="42" y="40" width="12" height="1" fill="#aa8820"/>
  <rect x="42" y="48" width="12" height="1" fill="#6a5010"/>
  <rect x="42" y="41" width="1" height="7" fill="#aa8820"/>
  <rect x="53" y="41" width="1" height="7" fill="#aa8820"/>
  <!-- Briefcase center latch -->
  <rect x="47" y="43" width="5" height="3" fill="#ccaa30"/>
  <rect x="48" y="44" width="3" height="1" fill="#ffdd66"/>
  <!-- Briefcase handle -->
  <rect x="45" y="37" width="9" height="2" fill="#6a5010"/>
  <rect x="44" y="38" width="2" height="3" fill="#6a5010"/>
  <rect x="53" y="38" width="2" height="3" fill="#6a5010"/>

  <!-- Legs / Dark trousers -->
  <rect x="26" y="46" width="5" height="10" fill="#1a2a4a"/>
  <rect x="33" y="46" width="5" height="10" fill="#1a2a4a"/>
  <rect x="27" y="47" width="2" height="5" fill="#2a3a5a"/>

  <!-- Shoes (dress shoes) -->
  <rect x="23" y="55" width="9" height="4" fill="#0a0a0a"/>
  <rect x="32" y="55" width="9" height="4" fill="#0a0a0a"/>
  <rect x="23" y="55" width="9" height="1" fill="#333333"/>
  <rect x="32" y="55" width="9" height="1" fill="#333333"/>
  <!-- Shoe tip shine -->
  <rect x="24" y="56" width="3" height="2" fill="#222222"/>

  <!-- Body / Business shirt + jacket -->
  <rect x="22" y="30" width="20" height="17" fill="#2a3a6a"/>
  <!-- Lapels -->
  <rect x="22" y="30" width="7" height="10" fill="#1a2a5a"/>
  <rect x="35" y="30" width="7" height="10" fill="#1a2a5a"/>
  <!-- Shirt showing -->
  <rect x="29" y="30" width="6" height="10" fill="#f0f0f0"/>
  <!-- Jacket buttons -->
  <rect x="30" y="38" width="4" height="1" fill="#1a2a5a"/>
  <rect x="30" y="41" width="4" height="1" fill="#1a2a5a"/>
  <!-- Pocket square -->
  <rect x="23" y="32" width="4" height="3" fill="#ffffff"/>
  <rect x="24" y="31" width="2" height="2" fill="#ffffff"/>

  <!-- Tie -->
  <rect x="30" y="28" width="4" height="14" fill="#cc2222"/>
  <rect x="29" y="28" width="6" height="3" fill="#dd3333"/>
  <rect x="31" y="38" width="2" height="4" fill="#aa1111"/>
  <!-- Tie pattern -->
  <rect x="30" y="32" width="4" height="1" fill="#ff4444" opacity="0.5"/>
  <rect x="30" y="35" width="4" height="1" fill="#ff4444" opacity="0.5"/>

  <!-- Arms -->
  <rect x="16" y="31" width="6" height="13" fill="#2a3a6a"/>
  <rect x="42" y="31" width="6" height="9" fill="#2a3a6a"/>
  <!-- Shirt cuffs -->
  <rect x="15" y="43" width="8" height="2" fill="#f0f0f0"/>
  <rect x="41" y="39" width="8" height="2" fill="#f0f0f0"/>
  <!-- Hands -->
  <rect x="16" y="45" width="6" height="4" fill="#e8b890"/>
  <rect x="42" y="41" width="6" height="4" fill="#e8b890"/>

  <!-- Neck -->
  <rect x="29" y="25" width="6" height="6" fill="#e8b890"/>

  <!-- Head -->
  <rect x="21" y="11" width="22" height="16" fill="#e8b890"/>

  <!-- Hair (slightly graying at temples) -->
  <rect x="21" y="9" width="22" height="4" fill="#1a1a1a"/>
  <rect x="19" y="11" width="4" height="4" fill="#1a1a1a"/>
  <rect x="41" y="11" width="4" height="4" fill="#1a1a1a"/>
  <!-- Gray temples -->
  <rect x="19" y="12" width="3" height="3" fill="#888888"/>
  <rect x="42" y="12" width="3" height="3" fill="#888888"/>

  <!-- Eyes (confident, sharp) -->
  <rect x="25" y="17" width="5" height="4" fill="#ffffff"/>
  <rect x="34" y="17" width="5" height="4" fill="#ffffff"/>
  <rect x="26" y="18" width="3" height="2" fill="#1a1a6a"/>
  <rect x="35" y="18" width="3" height="2" fill="#1a1a6a"/>
  <rect x="26" y="18" width="1" height="1" fill="#ffffff"/>
  <rect x="35" y="18" width="1" height="1" fill="#ffffff"/>
  <!-- Eyebrows (defined) -->
  <rect x="25" y="16" width="5" height="1" fill="#1a1a1a"/>
  <rect x="34" y="16" width="5" height="1" fill="#1a1a1a"/>

  <!-- Confident smile -->
  <rect x="27" y="23" width="10" height="1" fill="#b08060"/>
  <rect x="27" y="24" width="2" height="1" fill="#b08060"/>
  <rect x="35" y="24" width="2" height="1" fill="#b08060"/>

  <!-- Watch on left wrist -->
  <rect x="15" y="43" width="4" height="2" fill="#aaaaaa"/>
  <rect x="16" y="43" width="2" height="2" fill="#333333"/>
</svg>
