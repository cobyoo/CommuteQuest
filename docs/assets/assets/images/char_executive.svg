<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" shape-rendering="crispEdges">
  <!-- Executive: Full power suit, commanding presence, crown-like hair -->

  <!-- Executive aura (golden glow) -->
  <rect x="10" y="4" width="44" height="56" fill="#ffcc00" opacity="0.10"/>
  <rect x="12" y="6" width="40" height="52" fill="#ffaa00" opacity="0.08"/>

  <!-- Shadow (large = presence) -->
  <ellipse cx="32" cy="61" rx="13" ry="2.5" fill="#00000066"/>

  <!-- Legs / Bespoke black trousers -->
  <rect x="24" y="46" width="7" height="10" fill="#0a0a0a"/>
  <rect x="33" y="46" width="7" height="10" fill="#0a0a0a"/>
  <!-- Trouser crease -->
  <rect x="27" y="46" width="1" height="10" fill="#1a1a1a"/>
  <rect x="36" y="46" width="1" height="10" fill="#1a1a1a"/>

  <!-- Executive shoes (mirror polish) -->
  <rect x="21" y="55" width="11" height="4" fill="#030303"/>
  <rect x="32" y="55" width="11" height="4" fill="#030303"/>
  <rect x="21" y="55" width="11" height="1" fill="#151515"/>
  <rect x="32" y="55" width="11" height="1" fill="#151515"/>
  <!-- Mirror polish reflection -->
  <rect x="22" y="56" width="6" height="1" fill="#222222"/>
  <rect x="33" y="56" width="6" height="1" fill="#222222"/>

  <!-- Body / Power suit (black with subtle sheen) -->
  <rect x="19" y="26" width="26" height="21" fill="#0d0d1a"/>
  <!-- Power lapels (wide) -->
  <rect x="19" y="26" width="10" height="16" fill="#050510"/>
  <rect x="35" y="26" width="10" height="16" fill="#050510"/>
  <!-- Crisp white shirt -->
  <rect x="29" y="26" width="6" height="14" fill="#ffffff"/>
  <!-- Suit sheen lines -->
  <rect x="19" y="26" width="2" height="21" fill="#1a1a2a"/>
  <rect x="43" y="26" width="2" height="21" fill="#1a1a2a"/>

  <!-- Gold tie (signature executive) -->
  <rect x="30" y="25" width="4" height="16" fill="#ccaa00"/>
  <rect x="29" y="25" width="6" height="4" fill="#ddbb00"/>
  <rect x="31" y="37" width="2" height="4" fill="#aa8800"/>
  <!-- Tie sheen -->
  <rect x="31" y="27" width="1" height="12" fill="#ffee66" opacity="0.4"/>

  <!-- Platinum tie bar with gem -->
  <rect x="27" y="33" width="10" height="2" fill="#e8e8e8"/>
  <rect x="27" y="33" width="10" height="1" fill="#f8f8f8"/>
  <rect x="31" y="32" width="2" height="4" fill="#e8e8e8"/>
  <rect x="31" y="33" width="2" height="2" fill="#44aaff"/>

  <!-- Arms (commanding, slightly wide) -->
  <rect x="11" y="27" width="8" height="15" fill="#0d0d1a"/>
  <rect x="45" y="27" width="8" height="15" fill="#0d0d1a"/>
  <!-- Double-cuff excellence -->
  <rect x="10" y="40" width="10" height="3" fill="#ffffff"/>
  <rect x="44" y="40" width="10" height="3" fill="#ffffff"/>
  <!-- Signature gold cufflinks -->
  <rect x="18" y="40" width="3" height="3" fill="#ffcc00"/>
  <rect x="43" y="40" width="3" height="3" fill="#ffcc00"/>
  <rect x="19" y="41" width="1" height="1" fill="#ffffff"/>
  <rect x="44" y="41" width="1" height="1" fill="#ffffff"/>
  <!-- Hands -->
  <rect x="11" y="43" width="8" height="5" fill="#c89060"/>
  <rect x="45" y="43" width="8" height="5" fill="#c89060"/>

  <!-- Prestige watch (left) -->
  <rect x="10" y="40" width="6" height="3" fill="#ccaa00"/>
  <rect x="11" y="40" width="4" height="3" fill="#111111"/>
  <rect x="12" y="41" width="2" height="1" fill="#4488ff"/>
  <rect x="11" y="38" width="4" height="3" fill="#6a4400"/>

  <!-- Breast pocket (silk square, gold) -->
  <rect x="20" y="28" width="7" height="6" fill="#050510"/>
  <rect x="21" y="27" width="5" height="3" fill="#ffee88"/>
  <rect x="22" y="27" width="3" height="2" fill="#ffcc44"/>

  <!-- Neck -->
  <rect x="29" y="21" width="6" height="6" fill="#c89060"/>

  <!-- Head (commanding, strong features) -->
  <rect x="19" y="8" width="26" height="15" fill="#c89060"/>
  <!-- Strong jaw -->
  <rect x="19" y="20" width="6" height="3" fill="#b87850"/>
  <rect x="39" y="20" width="6" height="3" fill="#b87850"/>

  <!-- Crown-like silver hair (swept back, commanding) -->
  <rect x="19" y="5" width="26" height="5" fill="#cccccc"/>
  <rect x="17" y="7" width="6" height="5" fill="#cccccc"/>
  <rect x="41" y="7" width="6" height="5" fill="#cccccc"/>
  <!-- Crown peaks in hair -->
  <rect x="21" y="3" width="4" height="4" fill="#dddddd"/>
  <rect x="29" y="2" width="6" height="4" fill="#eeeeee"/>
  <rect x="39" y="3" width="4" height="4" fill="#dddddd"/>
  <rect x="25" y="3" width="3" height="3" fill="#d8d8d8"/>
  <rect x="36" y="3" width="3" height="3" fill="#d8d8d8"/>
  <!-- Hair sheen -->
  <rect x="22" y="5" width="8" height="2" fill="#ffffff" opacity="0.4"/>

  <!-- Eyes (piercing executive gaze) -->
  <rect x="23" y="13" width="7" height="5" fill="#ffffff"/>
  <rect x="34" y="13" width="7" height="5" fill="#ffffff"/>
  <rect x="24" y="14" width="5" height="3" fill="#0a0a2a"/>
  <rect x="35" y="14" width="5" height="3" fill="#0a0a2a"/>
  <rect x="24" y="14" width="1" height="1" fill="#ffffff"/>
  <rect x="35" y="14" width="1" height="1" fill="#ffffff"/>
  <!-- Command brows -->
  <rect x="22" y="12" width="8" height="2" fill="#333333"/>
  <rect x="34" y="12" width="8" height="2" fill="#333333"/>
  <rect x="22" y="11" width="4" height="2" fill="#555555"/>
  <rect x="38" y="11" width="4" height="2" fill="#555555"/>

  <!-- Executive expression (composed authority) -->
  <rect x="26" y="20" width="12" height="1" fill="#a07050"/>
  <rect x="27" y="19" width="2" height="1" fill="#a07050"/>
  <rect x="35" y="19" width="2" height="1" fill="#a07050"/>

  <!-- Gold executive pin (E) on lapel -->
  <rect x="36" y="28" width="5" height="6" fill="#ffcc00"/>
  <rect x="37" y="29" width="3" height="4" fill="#cc9900"/>
  <rect x="37" y="29" width="3" height="1" fill="#ffee44"/>
  <rect x="37" y="31" width="2" height="1" fill="#ffee44"/>
  <rect x="37" y="32" width="3" height="1" fill="#ffee44"/>
</svg>
