<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" shape-rendering="crispEdges">
  <!-- Director: Premium suit, luxury watch, sophisticated look -->

  <!-- Subtle prestige glow -->
  <rect x="14" y="6" width="36" height="52" fill="#ffdd88" opacity="0.08"/>

  <!-- Shadow -->
  <ellipse cx="32" cy="61" rx="11" ry="2" fill="#00000055"/>

  <!-- Legs / Premium trousers with pinstripe -->
  <rect x="25" y="46" width="6" height="10" fill="#111133"/>
  <rect x="33" y="46" width="6" height="10" fill="#111133"/>
  <!-- Pinstripe detail -->
  <rect x="27" y="46" width="1" height="10" fill="#222255" opacity="0.6"/>
  <rect x="35" y="46" width="1" height="10" fill="#222255" opacity="0.6"/>

  <!-- Italian leather shoes -->
  <rect x="22" y="55" width="10" height="4" fill="#050505"/>
  <rect x="32" y="55" width="10" height="4" fill="#050505"/>
  <rect x="22" y="55" width="10" height="1" fill="#1a1a1a"/>
  <rect x="32" y="55" width="10" height="1" fill="#1a1a1a"/>
  <!-- High polish shine -->
  <rect x="23" y="56" width="5" height="1" fill="#2a2a2a"/>
  <rect x="33" y="56" width="5" height="1" fill="#2a2a2a"/>

  <!-- Body / Bespoke suit (charcoal) -->
  <rect x="20" y="27" width="24" height="20" fill="#1a1a2a"/>
  <!-- Fine lapels -->
  <rect x="20" y="27" width="9" height="14" fill="#111122"/>
  <rect x="35" y="27" width="9" height="14" fill="#111122"/>
  <!-- White shirt -->
  <rect x="29" y="27" width="6" height="12" fill="#f8f8f8"/>
  <!-- Subtle jacket stitching -->
  <rect x="20" y="27" width="1" height="20" fill="#222233"/>
  <rect x="43" y="27" width="1" height="20" fill="#222233"/>

  <!-- Silk tie (deep burgundy) -->
  <rect x="30" y="26" width="4" height="14" fill="#6a0020"/>
  <rect x="29" y="26" width="6" height="3" fill="#7a0030"/>
  <rect x="31" y="36" width="2" height="4" fill="#550018"/>
  <!-- Tie sheen -->
  <rect x="31" y="28" width="1" height="10" fill="#aa2244" opacity="0.4"/>

  <!-- Platinum tie bar -->
  <rect x="28" y="33" width="8" height="2" fill="#e0e0e0"/>
  <rect x="28" y="33" width="8" height="1" fill="#f5f5f5"/>

  <!-- Arms -->
  <rect x="13" y="28" width="7" height="14" fill="#1a1a2a"/>
  <rect x="44" y="28" width="7" height="14" fill="#1a1a2a"/>
  <!-- French cuffs -->
  <rect x="12" y="40" width="9" height="3" fill="#f8f8f8"/>
  <rect x="43" y="40" width="9" height="3" fill="#f8f8f8"/>
  <!-- Gold cufflinks -->
  <rect x="19" y="40" width="3" height="3" fill="#ffcc00"/>
  <rect x="42" y="40" width="3" height="3" fill="#ffcc00"/>
  <rect x="20" y="41" width="1" height="1" fill="#ffee88"/>
  <rect x="43" y="41" width="1" height="1" fill="#ffee88"/>
  <!-- Hands -->
  <rect x="13" y="43" width="7" height="4" fill="#d8a070"/>
  <rect x="44" y="43" width="7" height="4" fill="#d8a070"/>

  <!-- Luxury watch on left wrist -->
  <rect x="12" y="40" width="5" height="3" fill="#ccaa00"/>
  <rect x="13" y="40" width="3" height="3" fill="#222222"/>
  <rect x="14" y="41" width="1" height="1" fill="#4488ff"/>
  <!-- Watch strap -->
  <rect x="12" y="39" width="5" height="2" fill="#884400"/>

  <!-- Breast pocket + silk square -->
  <rect x="21" y="29" width="6" height="5" fill="#111122"/>
  <rect x="22" y="28" width="4" height="3" fill="#f8f8f8"/>
  <rect x="22" y="28" width="4" height="3" fill="#ffeecc" opacity="0.5"/>

  <!-- Neck -->
  <rect x="29" y="22" width="6" height="6" fill="#d8a070"/>

  <!-- Head (distinguished) -->
  <rect x="20" y="9" width="24" height="15" fill="#d8a070"/>
  <!-- Slight age lines = distinguished -->
  <rect x="25" y="19" width="4" height="1" fill="#c89060" opacity="0.5"/>
  <rect x="35" y="19" width="4" height="1" fill="#c89060" opacity="0.5"/>

  <!-- Silver hair (distinguished) -->
  <rect x="20" y="7" width="24" height="4" fill="#888888"/>
  <rect x="18" y="9" width="5" height="4" fill="#888888"/>
  <rect x="41" y="9" width="5" height="4" fill="#888888"/>
  <!-- Silver highlights -->
  <rect x="21" y="7" width="6" height="3" fill="#aaaaaa"/>
  <rect x="37" y="7" width="6" height="3" fill="#aaaaaa"/>
  <rect x="22" y="6" width="4" height="2" fill="#cccccc"/>
  <rect x="38" y="6" width="4" height="2" fill="#cccccc"/>

  <!-- Eyes (calm authority) -->
  <rect x="24" y="14" width="6" height="5" fill="#ffffff"/>
  <rect x="34" y="14" width="6" height="5" fill="#ffffff"/>
  <rect x="25" y="15" width="4" height="3" fill="#1a3a6a"/>
  <rect x="35" y="15" width="4" height="3" fill="#1a3a6a"/>
  <rect x="25" y="15" width="1" height="1" fill="#ffffff"/>
  <rect x="35" y="15" width="1" height="1" fill="#ffffff"/>
  <!-- Distinguished brows (salt/pepper) -->
  <rect x="23" y="13" width="7" height="2" fill="#555555"/>
  <rect x="34" y="13" width="7" height="2" fill="#555555"/>
  <rect x="23" y="13" width="3" height="1" fill="#888888"/>
  <rect x="38" y="13" width="3" height="1" fill="#888888"/>

  <!-- Composed expression (slight knowing smile) -->
  <rect x="27" y="21" width="10" height="1" fill="#b08060"/>
  <rect x="28" y="20" width="2" height="1" fill="#b08060"/>
  <rect x="34" y="20" width="2" height="1" fill="#b08060"/>

  <!-- Director star pin on lapel -->
  <rect x="37" y="30" width="3" height="3" fill="#ffcc00"/>
  <rect x="38" y="29" width="1" height="5" fill="#ffcc00"/>
  <rect x="36" y="31" width="5" height="1" fill="#ffcc00"/>
  <rect x="38" y="31" width="1" height="1" fill="#ffffff"/>
</svg>
